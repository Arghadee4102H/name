<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Forge Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <i class="fa-solid fa-user-astronaut"></i> Identity Forge
        </div>
        <div class="theme-toggle" id="themeToggle">
            <i class="fa-solid fa-moon"></i>
        </div>
        <div class="hamburger" id="hamburgerMenu">
            <i class="fa-solid fa-bars"></i>
        </div>
        <nav class="nav-menu" id="navMenu">
            <a href="#home">Home</a>
            <a href="#generator">Generator</a>
            <a href="#about">About</a>
        </nav>
    </header>

    <main>
        <section id="home" class="hero-section">
            <div class="glow-bg"></div>
            <h1 class="hero-title">Generate Realistic Identities Instantly</h1>
            <p class="hero-subtitle">Fast • Random • Secure</p>
            <button class="cta-button" onclick="document.getElementById('generator').scrollIntoView({behavior: 'smooth'})">Start Generating</button>
        </section>

        <section id="generator" class="generator-section">
            <div class="glass-card controls-card">
                <h2>Configuration</h2>
                
                <div class="input-group">
                    <label for="gender">Gender</label>
                    <select id="gender">
                        <option value="any">Any</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="country">Country</label>
                    <select id="country">
                        <option value="random">Random Country</option>
                        <option value="usa">USA</option>
                        <option value="uk">UK</option>
                        <option value="canada">Canada</option>
                        <option value="germany">Germany</option>
                        <option value="australia">Australia</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="quantity">Quantity: <span id="quantityValue">1</span></label>
                    <input type="range" id="quantity" min="1" max="20" value="1">
                </div>

                <div class="toggle-group">
                    <label class="switch">
                        <input type="checkbox" id="randomMode">
                        <span class="slider round"></span>
                    </label>
                    <span>Fully Random Mode</span>
                </div>

                <div class="button-group desktop-only">
                    <button id="generateBtn" class="primary-btn"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate</button>
                    <button id="resetBtn" class="secondary-btn"><i class="fa-solid fa-rotate-right"></i> Reset</button>
                </div>
            </div>

            <div class="glass-card output-card">
                <div class="output-header">
                    <h2>Generated Identities</h2>
                    <div class="output-actions">
                        <button id="copyAllBtn" class="icon-btn" title="Copy All"><i class="fa-solid fa-copy"></i></button>
                        <button id="downloadBtn" class="icon-btn" title="Download TXT"><i class="fa-solid fa-download"></i></button>
                    </div>
                </div>
                
                <div id="loadingSpinner" class="loading-spinner hidden">
                    <div class="spinner"></div>
                </div>
                
                <div id="resultsContainer" class="results-container">
                    <!-- Cards will be generated here -->
                </div>
            </div>
        </section>
    </main>

    <footer id="about">
        <p>&copy; 2026 Identity Forge Generator</p>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms</a>
            <a href="#">Contact</a>
        </div>
    </footer>

    <!-- Mobile Sticky Button -->
    <div class="sticky-bottom mobile-only">
        <button id="generateBtnMobile" class="primary-btn full-width"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate Identity</button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Copied to clipboard!</div>

    <script src="app.js"></script>
</body>
</html>
